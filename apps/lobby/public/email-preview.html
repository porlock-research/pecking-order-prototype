<script>
function showEmail(type, btn) {
  document.querySelectorAll('#frame iframe').forEach(function(f) { f.classList.add('hidden'); });
  document.getElementById('email-' + type).classList.remove('hidden');
  document.querySelectorAll('.email-tabs button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function setViewport(size, btn) {
  var frame = document.getElementById('frame');
  frame.classList.remove('desktop', 'mobile');
  frame.classList.add(size);
  document.querySelectorAll('.tabs button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}
</script>
