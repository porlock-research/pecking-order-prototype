<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Cast Strip A vs B</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e;
    --surface: #13131a;
    --surface-2: #1a1a24;
    --surface-3: #1e1e2a;
    --text-1: #f0f0f0;
    --text-2: #999;
    --text-3: #555;
    --text-4: #333;
    --accent: #ff3b6f;
    --accent-g: rgba(255,59,111,0.15);
    --accent-g2: rgba(255,59,111,0.35);
    --gold: #ffd700;
    --gold-g: rgba(255,215,0,0.25);
    --nudge: #ffa500;
    --nudge-g: rgba(255,165,0,0.30);
    --whisper: #9b59b6;
    --whisper-g: rgba(155,89,182,0.30);
    --online: #2ecc71;
    --online-g: rgba(46,204,113,0.30);
    --border: rgba(255,255,255,0.06);
    --r-sm: 8px; --r-md: 10px; --r-lg: 12px; --r-pill: 100px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#060608; font-family:'Outfit',sans-serif; color:var(--text-1);
    min-height:100vh; padding:24px 16px;
    display:flex; flex-direction:column; align-items:center;
  }
  .page { max-width:900px; width:100%; }
  .hdr { text-align:center; margin-bottom:14px; }
  .hdr h1 { font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:3px; color:var(--accent); margin-bottom:8px; }
  .hdr p { font-size:12px; color:var(--text-2); line-height:1.5; max-width:720px; margin:0 auto; }

  .controls { display:flex; gap:14px; justify-content:center; align-items:center; margin:18px 0 28px; flex-wrap:wrap; }
  .ctrl-grp { display:flex; gap:4px; background:var(--surface); padding:4px; border-radius:var(--r-pill); border:1px solid var(--border); }
  .ctrl-grp label { font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-3); padding:8px 12px; align-self:center; }
  .ctrl-btn {
    background:transparent; border:none; color:var(--text-2);
    font-family:inherit; font-size:11px; font-weight:700; letter-spacing:.5px;
    padding:8px 14px; border-radius:var(--r-pill); cursor:pointer;
    transition:background .15s, color .15s;
  }
  .ctrl-btn:hover { color:var(--text-1); }
  .ctrl-btn.active { background:var(--accent); color:#fff; }

  .phone-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; margin:0 auto; }
  .phone {
    width:390px; background:var(--bg);
    border-radius:36px; border:2px solid #1a1a24;
    overflow:hidden; position:relative;
    box-shadow:0 30px 60px rgba(0,0,0,0.5);
    display:flex; flex-direction:column; height:800px;
  }
  .status-bar { height:36px; display:flex; align-items:center; justify-content:space-between; padding:0 20px 0 24px; font-size:13px; font-weight:600; flex-shrink:0; color:var(--text-2); }
  .hdr-top {
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 14px 10px; flex-shrink:0;
  }
  .hdr-title { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--text-3); }
  .hdr-btn {
    width:32px; height:32px; border-radius:10px;
    background:var(--surface); display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text-2); font-size:15px;
    position:relative;
  }
  .hdr-btn:hover { color:var(--text-1); }
  .hdr-btn .pip {
    position:absolute; top:-2px; right:-2px;
    min-width:14px; height:14px; padding:0 4px;
    border-radius:var(--r-pill); background:var(--accent);
    color:#fff; font-size:9px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    border:2px solid var(--bg);
  }

  /* Pulse bar */
  .pbar {
    display:flex; gap:8px; padding:8px 14px; height:44px;
    border-bottom:1px solid var(--border); flex-shrink:0;
    overflow-x:auto; scrollbar-width:none;
  }
  .pbar::-webkit-scrollbar { display:none; }
  .pill {
    flex-shrink:0; display:flex; align-items:center; gap:6px;
    padding:5px 11px; border-radius:var(--r-pill);
    font-size:11px; font-weight:700;
    background:var(--surface); border:1px solid transparent;
    color:var(--text-2); cursor:pointer;
  }
  .pill.active { background:var(--accent-g); border-color:var(--accent-g2); color:var(--accent); }
  .pill.soon { color:var(--text-3); border-style:dashed; border-color:var(--text-4); }
  .pill .dot {
    width:6px; height:6px; border-radius:50%; background:var(--accent);
    animation:breathe 2s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* Cast Strip */
  .cast-strip {
    display:flex; gap:10px; padding:10px 14px; height:92px;
    border-bottom:1px solid var(--border); flex-shrink:0;
    overflow-x:auto; scrollbar-width:none;
    background:linear-gradient(180deg, rgba(255,59,111,0.02), transparent 60%);
  }
  .cast-strip::-webkit-scrollbar { display:none; }
  .cast-chip {
    flex-shrink:0; position:relative;
    width:60px; height:72px;
    border-radius:12px; overflow:visible;
    cursor:pointer;
  }
  .cast-chip-inner {
    width:60px; height:72px; border-radius:12px;
    overflow:hidden; position:relative;
    transition:transform .15s;
  }
  .cast-chip:hover .cast-chip-inner { transform:scale(1.03); }
  .cast-chip img {
    width:100%; height:100%; object-fit:cover; object-position:center top;
    display:block;
  }
  .cast-chip .namebar {
    position:absolute; left:0; right:0; bottom:0;
    padding:2px 4px 3px; text-align:center;
    font-size:8px; font-weight:700; letter-spacing:.3px;
    color:#fff;
    background:linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
    text-overflow:ellipsis; overflow:hidden; white-space:nowrap;
  }
  .cast-chip .namebar .typing-dots {
    display:inline-flex; gap:2px; vertical-align:middle; margin-left:3px;
  }
  .cast-chip .namebar .typing-dots span {
    width:3px; height:3px; border-radius:50%; background:var(--accent);
    animation:breathe .9s ease-in-out infinite;
  }
  .cast-chip .namebar .typing-dots span:nth-child(2){ animation-delay:.15s; }
  .cast-chip .namebar .typing-dots span:nth-child(3){ animation-delay:.3s; }

  /* state rings (absolute outside the inner) */
  .cast-ring {
    position:absolute; inset:-3px; border-radius:14px;
    pointer-events:none;
  }
  .cast-ring.online { border:2px solid var(--online); animation:breathe 2.2s ease-in-out infinite; opacity:.7; }
  .cast-ring.unread { border:2px solid var(--accent); box-shadow:0 0 10px var(--accent-g2); }
  .cast-ring.typing { border:2px solid var(--accent); animation:breathe .9s ease-in-out infinite; }
  .cast-ring.whisper { border:2px solid var(--whisper); box-shadow:0 0 12px var(--whisper-g); animation:breathe 1.6s ease-in-out infinite; }
  .cast-ring.live { border:2px solid var(--online); animation:breathe 1s ease-in-out infinite; box-shadow:0 0 10px var(--online-g); }
  .cast-ring.self { border:2px solid var(--accent); }

  .cast-badge {
    position:absolute; top:-6px; right:-6px;
    min-width:18px; height:18px; padding:0 5px;
    border-radius:var(--r-pill); background:var(--accent);
    color:#fff; font-size:10px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    border:2px solid var(--bg);
  }
  .cast-invite {
    position:absolute; bottom:-4px; left:50%; transform:translateX(-50%);
    background:var(--nudge); color:#fff;
    font-size:9px; font-weight:800; letter-spacing:.5px; text-transform:uppercase;
    padding:2px 7px; border-radius:var(--r-pill);
    border:2px solid var(--bg);
    animation:pulse-grow 1.4s ease-in-out infinite;
    white-space:nowrap;
  }
  @keyframes pulse-grow { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.08)} }

  .you-tag {
    position:absolute; top:-5px; left:50%; transform:translateX(-50%);
    background:var(--accent); color:#fff; font-size:7px; font-weight:800;
    letter-spacing:.5px; padding:1px 6px; border-radius:5px; text-transform:uppercase;
    border:1.5px solid var(--bg);
  }
  .silver-shimmer {
    position:absolute; inset:0;
    background:linear-gradient(110deg, transparent 30%, var(--gold-g) 45%, transparent 60%);
    background-size:200% 100%;
    animation:shimmer 2.2s ease infinite;
    pointer-events:none;
    mix-blend-mode:screen;
    border-radius:12px;
  }
  @keyframes shimmer { 0%{background-position:-100% 0} 100%{background-position:200% 0} }

  .cast-chip.offline .cast-chip-inner img { opacity:.5; filter:saturate(0.5); }

  .cast-add {
    flex-shrink:0; width:60px; height:72px;
    border-radius:12px; background:var(--surface-2);
    border:2px dashed var(--text-4);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text-3); cursor:pointer; gap:2px;
    font-size:8px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  }
  .cast-add .plus { font-size:22px; line-height:1; font-weight:300; color:var(--text-2); }

  /* Main content area */
  .main {
    flex:1; overflow:hidden; position:relative;
    display:flex; flex-direction:column;
  }
  .chat {
    flex:1; overflow-y:auto; padding:10px 0; scrollbar-width:none;
  }
  .chat::-webkit-scrollbar { display:none; }
  .msg { display:flex; gap:10px; padding:5px 14px; }
  .msg-av { width:40px; height:40px; border-radius:var(--r-lg); object-fit:cover; flex-shrink:0; }
  .msg-bd { flex:1; min-width:0; }
  .msg-meta { display:flex; align-items:baseline; gap:6px; margin-bottom:2px; }
  .msg-nm { font-size:12px; font-weight:700; }
  .msg-st { font-size:9px; color:var(--text-3); font-weight:500; text-transform:uppercase; letter-spacing:.5px; }
  .msg-tx { font-size:13px; color:#ccc; line-height:1.45; }
  .msg.self { flex-direction:row-reverse; }
  .msg.self .msg-bd { background:var(--accent-g); padding:6px 10px; border-radius:var(--r-lg); flex:0 1 auto; }
  .msg.self .msg-tx { color:var(--text-1); padding-right:0; }

  .narrator {
    padding:4px 20px; font-size:11px; font-style:italic;
    color:var(--text-3); text-align:center; line-height:1.4;
  }
  .narrator strong { color:var(--accent); font-style:normal; font-weight:700; }
  .narrator.alliance strong { color:var(--gold); }
  .narrator.whisper strong { color:var(--whisper); }

  /* DM view */
  .dm-surface {
    position:absolute; inset:0; background:var(--bg);
    display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .28s cubic-bezier(.2,.9,.3,1);
    z-index:20;
  }
  .dm-surface.open { transform:translateX(0); }
  .dm-hdr {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .dm-back {
    width:32px; height:32px; border-radius:10px; background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-2); font-size:16px; cursor:pointer;
  }
  .dm-hdr img {
    width:40px; height:40px; border-radius:var(--r-lg); object-fit:cover;
  }
  .dm-hdr-bd { flex:1; min-width:0; }
  .dm-hdr-nm { font-size:14px; font-weight:700; }
  .dm-hdr-st { font-size:10px; color:var(--text-3); font-weight:500; text-transform:uppercase; letter-spacing:.5px; }
  .dm-hdr-st .online { color:var(--online); }
  .dm-hdr-actions { display:flex; gap:6px; }
  .dm-hdr-actions .hb {
    width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .dm-hdr-actions .silver { background:rgba(255,215,0,.1); color:var(--gold); }
  .dm-hdr-actions .nudge { background:rgba(255,165,0,.1); color:var(--nudge); }

  .dm-body {
    flex:1; overflow-y:auto; padding:12px 0; scrollbar-width:none;
  }
  .dm-body::-webkit-scrollbar { display:none; }
  .dm-privacy {
    text-align:center; font-size:10px; color:var(--text-4);
    padding:4px 0 10px; letter-spacing:.5px;
  }

  /* Social panel */
  .panel-scrim {
    position:absolute; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
    opacity:0; pointer-events:none; transition:opacity .2s;
    z-index:30;
  }
  .panel-scrim.open { opacity:1; pointer-events:auto; }
  .panel {
    position:absolute; left:0; right:0; bottom:0;
    background:var(--surface);
    border-radius:24px 24px 0 0;
    border-top:1px solid var(--border);
    transform:translateY(100%); transition:transform .3s cubic-bezier(.2,.9,.3,1);
    z-index:31; max-height:calc(100% - 80px);
    display:flex; flex-direction:column;
  }
  .panel.open { transform:translateY(0); }
  .panel-handle {
    width:40px; height:4px; background:var(--text-4); border-radius:2px;
    margin:10px auto 4px; flex-shrink:0;
  }
  .panel-body {
    overflow-y:auto; padding:8px 0 16px; scrollbar-width:none;
  }
  .panel-body::-webkit-scrollbar { display:none; }

  .person-hero {
    padding:16px 16px 12px; display:flex; flex-direction:column; gap:12px;
    border-bottom:1px solid var(--border);
  }
  .person-hero-head {
    display:flex; gap:14px; align-items:flex-start;
  }
  .person-hero-img {
    width:84px; height:100px; border-radius:var(--r-lg); object-fit:cover;
    flex-shrink:0; box-shadow:0 8px 20px rgba(0,0,0,0.4);
  }
  .person-hero-bd { flex:1; min-width:0; padding-top:4px; }
  .person-hero-nm { font-size:22px; font-weight:800; line-height:1.1; margin-bottom:2px; }
  .person-hero-st { font-size:11px; font-weight:600; color:var(--text-2); letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
  .person-hero-status {
    display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--text-3);
  }
  .person-hero-status .sdot { width:7px; height:7px; border-radius:50%; background:var(--online); }
  .person-hero-actions { display:flex; gap:8px; }
  .pact {
    flex:1; padding:10px 8px; border-radius:var(--r-lg);
    display:flex; flex-direction:column; align-items:center; gap:2px;
    cursor:pointer;
    font-family:inherit; font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase;
    border:1px solid var(--border); background:var(--surface-2); color:var(--text-2);
  }
  .pact.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .pact.silver { color:var(--gold); border-color:rgba(255,215,0,0.25); }
  .pact.nudge { color:var(--nudge); border-color:rgba(255,165,0,0.25); }

  .dm-preview {
    padding:12px 16px 8px;
  }
  .dm-preview-label {
    font-size:9px; font-weight:800; letter-spacing:1.5px; color:var(--text-3); text-transform:uppercase; margin-bottom:8px;
  }
  .dm-preview-bubbles {
    display:flex; flex-direction:column; gap:6px; padding:6px 0;
  }
  .dm-bubble {
    max-width:80%; padding:6px 10px; border-radius:12px;
    font-size:12px; line-height:1.4;
  }
  .dm-bubble.them { background:var(--surface-2); color:var(--text-1); align-self:flex-start; }
  .dm-bubble.me { background:var(--accent-g); color:var(--text-1); align-self:flex-end; }

  .panel-section-hd {
    padding:18px 16px 8px; font-size:9px; font-weight:800; letter-spacing:1.5px;
    color:var(--text-3); text-transform:uppercase;
  }
  .panel-presence { padding:6px 12px 4px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
  .panel-presence::-webkit-scrollbar { display:none; }
  .pp-chip { flex-shrink:0; width:40px; }
  .pp-chip img { width:40px; height:40px; border-radius:10px; object-fit:cover; }
  .pp-chip .nm { font-size:9px; text-align:center; color:var(--text-2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pp-chip.dim img { opacity:.5; filter:saturate(.5); }

  .conv-row {
    display:flex; gap:12px; padding:10px 16px;
    cursor:pointer; position:relative;
  }
  .conv-row:hover { background:var(--surface-2); }
  .conv-row.pending { background:rgba(255,165,0,0.06); }
  .conv-av { flex-shrink:0; }
  .conv-av img {
    width:42px; height:42px; border-radius:var(--r-lg); object-fit:cover;
  }
  .conv-av.group { display:flex; }
  .conv-av.group img { width:36px; height:36px; border:2px solid var(--surface); }
  .conv-av.group img:not(:first-child) { margin-left:-10px; }
  .conv-bd { flex:1; min-width:0; }
  .conv-nm { font-size:13px; font-weight:700; }
  .conv-pv { font-size:11px; color:var(--text-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv-time { font-size:10px; color:var(--text-3); }
  .conv-meta { display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .conv-unread {
    min-width:18px; height:18px; padding:0 5px;
    border-radius:var(--r-pill); background:var(--accent);
    color:#fff; font-size:10px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
  }
  .pending-actions {
    display:flex; gap:6px; padding:8px 16px 10px;
    margin-top:-4px;
  }
  .pending-actions button {
    flex:1; padding:8px; border-radius:var(--r-md);
    font-family:inherit; font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase;
    cursor:pointer; border:none;
  }
  .pending-actions .accept { background:var(--online); color:#fff; }
  .pending-actions .decline { background:var(--surface-3); color:var(--text-2); }

  .standings { padding:8px 16px; display:flex; flex-wrap:wrap; gap:8px; }
  .stand-card {
    width:calc(50% - 4px); background:var(--surface-2); border-radius:var(--r-lg);
    padding:8px; display:flex; gap:8px; align-items:center; border:1px solid var(--border);
  }
  .stand-card img { width:34px; height:34px; border-radius:8px; object-fit:cover; }
  .stand-card .sc-nm { font-size:11px; font-weight:700; }
  .stand-card .sc-sl { font-size:10px; color:var(--gold); font-weight:700; }
  .stand-card .sc-rank {
    margin-left:auto; font-size:10px; font-weight:800; color:var(--text-3);
  }
  .stand-card.first .sc-rank { color:var(--gold); }
  .stand-card.you { border-color:var(--accent); }

  /* Input */
  .input {
    display:flex; align-items:center; gap:8px; padding:10px 14px;
    border-top:1px solid var(--border); flex-shrink:0; background:var(--bg);
  }
  .input-field {
    flex:1; height:36px; border-radius:var(--r-pill);
    background:var(--surface-2); padding:0 14px;
    display:flex; align-items:center; font-size:12px; color:var(--text-3);
  }
  .input-chips { display:flex; gap:6px; padding:0 14px 8px; overflow:hidden; }
  .hint-chip { flex-shrink:0; font-size:10px; padding:4px 10px; border-radius:var(--r-pill); background:var(--surface-2); color:var(--text-2); font-weight:600; }

  .mode-note {
    margin-top:14px; padding:14px 18px; background:var(--surface);
    border-radius:var(--r-lg); border:1px solid var(--border);
    font-size:12px; color:var(--text-2); line-height:1.6; max-width:700px; text-align:left;
  }
  .mode-note strong { color:var(--text-1); }
  .mode-note .em { color:var(--accent); font-weight:700; }
  .mode-note kbd {
    font-family:inherit; font-size:10px; background:var(--surface-2); color:var(--text-1);
    padding:2px 6px; border-radius:5px; border:1px solid var(--border);
    font-weight:700; letter-spacing:.5px;
  }
</style>
</head>
<body>

<div class="page">
  <div class="hdr">
    <h1>Cast Strip — Interaction A vs B</h1>
    <p>Single phone frame. Flip interaction mode to compare. Every chip on the Cast Strip is in a different state so you can see the visual vocabulary at once.</p>
  </div>

  <div class="controls">
    <div class="ctrl-grp" id="modeCtrl">
      <label>Mode</label>
      <button class="ctrl-btn active" data-mode="A">A — Tap → DM</button>
      <button class="ctrl-btn" data-mode="B">B — Tap → Panel</button>
    </div>
    <div class="ctrl-grp" id="orderCtrl">
      <label>Order</label>
      <button class="ctrl-btn active" data-order="cast-top">Cast on top</button>
      <button class="ctrl-btn" data-order="pulse-top">Pulse on top</button>
    </div>
  </div>

  <div class="phone-wrap">
    <div class="phone" id="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span style="font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); font-weight:800;">Pulse</span>
      </div>
      <div class="hdr-top">
        <div class="hdr-title">Day 3 · 4pm</div>
        <div class="hdr-btn" id="peopleBtn" title="Open panel">
          ☰
          <span class="pip" id="peoplePip">3</span>
        </div>
      </div>
      <div id="chromeStack"></div>
      <div class="main">
        <div class="chat" id="chat"></div>
        <div class="dm-surface" id="dmSurface"></div>
      </div>
      <div class="input-chips">
        <div class="hint-chip">/silver</div><div class="hint-chip">/dm</div>
        <div class="hint-chip">/nudge</div><div class="hint-chip">/whisper</div>
        <div class="hint-chip">@mention</div>
      </div>
      <div class="input"><div class="input-field">Message the room…</div></div>

      <div class="panel-scrim" id="panelScrim"></div>
      <div class="panel" id="panel"><div class="panel-handle"></div><div class="panel-body" id="panelBody"></div></div>
    </div>
  </div>

  <div class="mode-note" id="modeNote"></div>
</div>

<script>
const ASSET = 'https://staging-assets.peckingorder.ca/personas';
const PEOPLE = [
  { id:'p7', name:'You',    stereotype:'The Schemer',      color:'#ff3b6f', img:ASSET+'/persona-11/headshot.png', self:true },
  { id:'p1', name:'Daisy',  stereotype:'The Farm Girl',    color:'#ff3b6f', img:ASSET+'/persona-05/headshot.png' },
  { id:'p5', name:'Brenda', stereotype:'The Matriarch',    color:'#67b7ff', img:ASSET+'/persona-03/headshot.png' },
  { id:'p3', name:'Brick',  stereotype:'The Mechanic',     color:'#5fc7a8', img:ASSET+'/persona-09/headshot.png' },
  { id:'p4', name:'Luna',   stereotype:'The Influencer',   color:'#e8a84c', img:ASSET+'/persona-12/headshot.png' },
  { id:'p2', name:'Silas',  stereotype:'The Brooding Artist', color:'#9b59b6', img:ASSET+'/persona-07/headshot.png' },
  { id:'p6', name:'Gary',   stereotype:'The Wildcard',     color:'#ff8b5a', img:ASSET+'/persona-01/headshot.png' },
];
// Per-person state for the demo. Different state per chip so all visual vocab is on screen.
const STATE = {
  p7: { kind:'self' },
  p1: { kind:'unread', count:2, lastFromThem:'still in?', preview:'daisy: still in?', online:true },
  p5: { kind:'pending', preview:'brenda wants to DM you', online:false },
  p3: { kind:'typing', online:true },
  p4: { kind:'silver', preview:'luna sent you 5 silver', online:true },
  p2: { kind:'whisper', online:false },
  p6: { kind:'online', online:true },
};
const ORDER = ['p7','p5','p1','p3','p4','p2','p6']; // self, pending, unread, typing, silver, whisper, online

const PENDING = [{ id:'p5' }];
const CONVERSATIONS = [
  { id:'c-main', kind:'main', name:'The Room', preview:'gary: so whos going?', unread:0, members:['p1','p2','p3','p4','p5','p6','p7'], time:'now' },
  { id:'c-p1',   kind:'dm', partnerId:'p1', unread:2, preview:'still in?', time:'2m' },
  { id:'c-p4',   kind:'dm', partnerId:'p4', unread:0, preview:'you: k deal', time:'12m' },
  { id:'c-g1',   kind:'group', name:'Alliance', memberIds:['p1','p3','p4'], unread:3, preview:'brick: we flip on gary tn', time:'4m' },
  { id:'c-g2',   kind:'group', name:'Kitchen Crew', memberIds:['p2','p5','p6'], unread:0, preview:'gary: lol', time:'1h' },
];

function byId(id){ return PEOPLE.find(p => p.id === id); }

// DOM helper
function h(tag, props, children) {
  const el = document.createElement(tag);
  if (props) {
    for (const k of Object.keys(props)) {
      if (k === 'class') el.className = props[k];
      else if (k === 'style') el.setAttribute('style', props[k]);
      else if (k === 'text') el.textContent = props[k];
      else if (k === 'src') el.src = props[k];
      else if (k === 'title') el.title = props[k];
      else if (k === 'alt') el.alt = props[k];
      else if (k === 'data') Object.assign(el.dataset, props[k]);
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), props[k]);
      else el.setAttribute(k, props[k]);
    }
  }
  if (children) {
    for (const c of children) {
      if (c == null || c === false) continue;
      el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
  }
  return el;
}
function clear(el){ while (el.firstChild) el.removeChild(el.firstChild); }
function attach(parent, ...nodes){ nodes.forEach(n => n && parent.appendChild(n)); }

// --- Builders ---
function buildPulseBar() {
  const pb = h('div',{class:'pbar'});
  attach(pb,
    h('div',{class:'pill active'}, [
      h('span',{class:'dot'}), 'Vote · 2:14'
    ]),
    h('div',{class:'pill'}, ['Trivia · 5pm']),
    h('div',{class:'pill soon'}, ['Dilemma · 7pm']),
  );
  return pb;
}
function castChip(person) {
  const st = STATE[person.id] || {};
  const chip = h('div',{class:'cast-chip' + (!st.online && !st.self && st.kind==='online' ? '' : (st.online || st.self ? '' : ' offline')), data:{ id: person.id }});
  const inner = h('div',{class:'cast-chip-inner'}, [
    h('img',{src:person.img, alt:''}),
    h('div',{class:'namebar'}, [
      person.name,
      st.kind === 'typing' ? h('span',{class:'typing-dots'}, [h('span'),h('span'),h('span')]) : null,
    ].filter(Boolean)),
  ]);
  chip.appendChild(inner);

  // ring
  const ringClass = st.kind === 'self' ? 'self'
    : st.kind === 'unread' ? 'unread'
    : st.kind === 'typing' ? 'typing'
    : st.kind === 'whisper' ? 'whisper'
    : st.kind === 'silver' ? 'online'
    : st.kind === 'online' ? 'online'
    : null;
  if (ringClass) chip.appendChild(h('div',{class:`cast-ring ${ringClass}`}));

  // overlays
  if (st.kind === 'silver') chip.appendChild(h('div',{class:'silver-shimmer'}));
  if (st.kind === 'unread') chip.appendChild(h('div',{class:'cast-badge', text:String(st.count)}));
  if (st.kind === 'pending') chip.appendChild(h('div',{class:'cast-invite', text:'Invite'}));
  if (st.kind === 'self') chip.appendChild(h('div',{class:'you-tag', text:'You'}));

  return chip;
}
function buildCastStrip() {
  const strip = h('div',{class:'cast-strip'});
  ORDER.forEach(id => strip.appendChild(castChip(byId(id))));
  strip.appendChild(h('div',{class:'cast-add'}, [h('div',{class:'plus', text:'+'}), 'New']));
  return strip;
}
function msgNode(personId, text, isSelf) {
  const p = byId(personId);
  if (isSelf) {
    return h('div',{class:'msg self'}, [
      h('div',{class:'msg-bd'}, [ h('div',{class:'msg-tx', text:text}) ]),
    ]);
  }
  return h('div',{class:'msg'}, [
    h('img',{class:'msg-av', src:p.img, alt:'', data:{id:personId}}),
    h('div',{class:'msg-bd'}, [
      h('div',{class:'msg-meta'}, [
        h('span',{class:'msg-nm', style:`color:${p.color}`, text:p.name}),
        h('span',{class:'msg-st', text:p.stereotype}),
      ]),
      h('div',{class:'msg-tx', text:text}),
    ]),
  ]);
}
function narratorLine(txt, flavor) {
  const node = h('div',{class:'narrator ' + (flavor||'')});
  // Parse bold markers in txt: **name**
  const parts = txt.split(/(\*\*[^*]+\*\*)/g);
  parts.forEach(part => {
    if (part.startsWith('**')) {
      node.appendChild(h('strong',{text: part.slice(2,-2)}));
    } else if (part) {
      node.appendChild(document.createTextNode(part));
    }
  });
  return node;
}

function buildChat() {
  return [
    msgNode('p1','did anyone see who brenda voted with?'),
    msgNode('p3','no idea but we should talk about tomorrow'),
    narratorLine('**Daisy** and **Brick** have started scheming', 'whisper'),
    msgNode('p7','im in, dm me', true),
    msgNode('p4','yall are scheming already??'),
    narratorLine('**Luna** accepted an alliance with someone', 'alliance'),
    msgNode('p6','lmao we\'re cooked'),
    narratorLine('**5 players** have formed an alliance headed by **Daisy**', 'alliance'),
  ];
}

// --- DM surface ---
function openDM(partnerId) {
  const p = byId(partnerId);
  const surf = document.getElementById('dmSurface');
  clear(surf);
  surf.appendChild(h('div',{class:'dm-hdr'}, [
    h('div',{class:'dm-back', text:'‹', onclick: closeDM}),
    h('img',{src:p.img, alt:''}),
    h('div',{class:'dm-hdr-bd'}, [
      h('div',{class:'dm-hdr-nm', style:`color:${p.color}`, text:p.name}),
      h('div',{class:'dm-hdr-st'}, [
        h('span',{class:'online', text:'● online'}),
        ' · ', p.stereotype,
      ]),
    ]),
    h('div',{class:'dm-hdr-actions'}, [
      h('div',{class:'hb silver', text:'$'}),
      h('div',{class:'hb nudge', text:'!'}),
    ]),
  ]));
  const body = h('div',{class:'dm-body'});
  body.appendChild(h('div',{class:'dm-privacy', text:'Private conversation'}));
  body.appendChild(msgNode(partnerId,'hey you free to talk?'));
  body.appendChild(msgNode(partnerId,'gary has been sus all day'));
  body.appendChild(msgNode('p7','yeah i noticed. whatcha thinking', true));
  body.appendChild(msgNode(partnerId,'still in?'));
  surf.appendChild(body);
  surf.classList.add('open');
}
function closeDM() {
  document.getElementById('dmSurface').classList.remove('open');
}

// --- Social panel ---
function openPanel(focusId) {
  const body = document.getElementById('panelBody');
  clear(body);

  if (focusId) {
    const p = byId(focusId);
    const st = STATE[focusId] || {};
    const statusText = st.online ? 'ONLINE' : 'LAST SEEN 12m';
    body.appendChild(h('div',{class:'person-hero'}, [
      h('div',{class:'person-hero-head'}, [
        h('img',{class:'person-hero-img', src:p.img, alt:''}),
        h('div',{class:'person-hero-bd'}, [
          h('div',{class:'person-hero-nm', style:`color:${p.color}`, text:p.name}),
          h('div',{class:'person-hero-st', text:p.stereotype}),
          h('div',{class:'person-hero-status'}, [
            st.online ? h('span',{class:'sdot'}) : null,
            statusText,
          ]),
        ]),
      ]),
      h('div',{class:'person-hero-actions'}, [
        h('div',{class:'pact primary', onclick: () => { closePanel(); openDM(focusId); }}, ['Open DM']),
        h('div',{class:'pact silver'}, ['Silver']),
        h('div',{class:'pact nudge'}, ['Nudge']),
      ]),
    ]));
    body.appendChild(h('div',{class:'dm-preview'}, [
      h('div',{class:'dm-preview-label', text:'Recent messages'}),
      h('div',{class:'dm-preview-bubbles'}, [
        h('div',{class:'dm-bubble them', text:'hey you free to talk?'}),
        h('div',{class:'dm-bubble me',   text:'yeah whatsup'}),
        h('div',{class:'dm-bubble them', text:'still in?'}),
      ]),
    ]));
    body.appendChild(h('div',{class:'panel-section-hd', text:'Your Conversations'}));
  } else {
    // Browse mode — presence first
    body.appendChild(h('div',{class:'panel-section-hd', text:'Here now'}));
    const presence = h('div',{class:'panel-presence'});
    PEOPLE.forEach(p => {
      const st = STATE[p.id] || {};
      const c = h('div',{class:'pp-chip' + ((!p.self && !st.online) ? ' dim' : '')});
      c.appendChild(h('img',{src:p.img, alt:''}));
      c.appendChild(h('div',{class:'nm', text: p.self ? 'You' : p.name}));
      presence.appendChild(c);
    });
    body.appendChild(presence);
    body.appendChild(h('div',{class:'panel-section-hd', text:'Your Conversations'}));
  }

  // Conversations rows
  CONVERSATIONS.forEach(c => {
    body.appendChild(convRow(c));
  });
  // Pending invite row
  PENDING.forEach(pend => {
    const p = byId(pend.id);
    const row = h('div',{class:'conv-row pending', onclick:()=>{}}, [
      h('div',{class:'conv-av'}, [ h('img',{src:p.img, alt:''}) ]),
      h('div',{class:'conv-bd'}, [
        h('div',{class:'conv-meta'}, [
          h('div',{class:'conv-nm', style:`color:${p.color}`, text:`${p.name} wants to DM you`}),
          h('div',{class:'conv-time', text:'just now'}),
        ]),
        h('div',{class:'conv-pv', text:p.stereotype + ' — invited you'}),
      ]),
    ]);
    body.appendChild(row);
    body.appendChild(h('div',{class:'pending-actions'}, [
      h('button',{class:'accept', text:'Accept'}),
      h('button',{class:'decline', text:'Decline'}),
    ]));
  });

  body.appendChild(h('div',{class:'panel-section-hd', text:'Standings'}));
  const sg = h('div',{class:'standings'});
  [
    { id:'p1', silver:45, rank:1, first:true },
    { id:'p7', silver:32, rank:2, you:true },
    { id:'p3', silver:28, rank:3 },
    { id:'p4', silver:22, rank:4 },
    { id:'p5', silver:15, rank:5 },
    { id:'p6', silver:8,  rank:6 },
  ].forEach(e => {
    const p = byId(e.id);
    const card = h('div',{class:'stand-card' + (e.first?' first':'') + (e.you?' you':'')}, [
      h('img',{src:p.img, alt:''}),
      h('div',{}, [
        h('div',{class:'sc-nm', text: e.you ? 'You' : p.name}),
        h('div',{class:'sc-sl', text: e.silver + ' silver'}),
      ]),
      h('div',{class:'sc-rank', text:'#'+e.rank}),
    ]);
    sg.appendChild(card);
  });
  body.appendChild(sg);

  document.getElementById('panel').classList.add('open');
  document.getElementById('panelScrim').classList.add('open');
}
function convRow(c) {
  let av;
  if (c.kind === 'main') {
    av = h('div',{class:'conv-av group'},
      c.members.slice(0,3).map(id => h('img',{src:byId(id).img, alt:''}))
    );
  } else if (c.kind === 'group') {
    av = h('div',{class:'conv-av group'},
      c.memberIds.slice(0,3).map(id => h('img',{src:byId(id).img, alt:''}))
    );
  } else {
    const p = byId(c.partnerId);
    av = h('div',{class:'conv-av'}, [ h('img',{src:p.img, alt:''}) ]);
  }
  const name = c.kind === 'dm' ? byId(c.partnerId).name : c.name;
  const color = c.kind === 'dm' ? byId(c.partnerId).color : '#f0f0f0';
  return h('div',{class:'conv-row', onclick:()=>{
    closePanel();
    if (c.kind === 'dm') openDM(c.partnerId);
  }}, [
    av,
    h('div',{class:'conv-bd'}, [
      h('div',{class:'conv-meta'}, [
        h('div',{class:'conv-nm', style:`color:${color}`, text:name}),
        h('div',{class:'conv-time', text:c.time}),
      ]),
      h('div',{class:'conv-pv', text:c.preview}),
    ]),
    c.unread ? h('div',{style:'align-self:center'}, [h('div',{class:'conv-unread', text:String(c.unread)})]) : null,
  ]);
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panelScrim').classList.remove('open');
}

// --- State/wiring ---
let mode = 'A';
let order = 'cast-top';

function updateMode() {
  const note = document.getElementById('modeNote');
  clear(note);
  if (mode === 'A') {
    note.appendChild(h('div',{}, [
      h('strong',{text:'Mode A — Tap → DM directly. '}),
      'Tap any Cast Strip chip and it opens the DM with that person. Zero friction to start a conversation. Use ',
      h('kbd',{text:'☰'}),
      ' in the header to open the Social panel when you want to browse all threads / see standings.',
    ]));
  } else {
    note.appendChild(h('div',{}, [
      h('strong',{text:'Mode B — Tap → Social panel focused on them. '}),
      'Tap any Cast Strip chip and the panel slides up hero-style — big persona image, status, DM preview, quick actions. Second tap "Open DM" to enter the conversation. Use ',
      h('kbd',{text:'☰'}),
      ' for the browse view (no focus).',
    ]));
  }
}
function rebuildChrome() {
  const host = document.getElementById('chromeStack');
  clear(host);
  const pulse = buildPulseBar();
  const cast = buildCastStrip();
  if (order === 'cast-top') { host.appendChild(cast); host.appendChild(pulse); }
  else { host.appendChild(pulse); host.appendChild(cast); }

  // Wire chip taps
  host.querySelectorAll('.cast-chip').forEach(chip => {
    const pid = chip.dataset.id;
    if (pid === 'p7') return; // self doesn't open anything
    chip.addEventListener('click', () => {
      if (mode === 'A') openDM(pid);
      else openPanel(pid);
    });
  });
}
function rebuildChat() {
  const chat = document.getElementById('chat');
  clear(chat);
  buildChat().forEach(m => chat.appendChild(m));
  // Wire avatar taps in chat to match mode
  chat.querySelectorAll('.msg-av').forEach(av => {
    av.style.cursor = 'pointer';
    av.addEventListener('click', () => {
      const pid = av.dataset.id;
      if (mode === 'A') openDM(pid);
      else openPanel(pid);
    });
  });
}

// Controls
document.querySelectorAll('#modeCtrl .ctrl-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#modeCtrl .ctrl-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    updateMode();
    rebuildChat(); // re-wire
  });
});
document.querySelectorAll('#orderCtrl .ctrl-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#orderCtrl .ctrl-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    order = b.dataset.order;
    rebuildChrome();
  });
});

document.getElementById('peopleBtn').addEventListener('click', () => openPanel(null));
document.getElementById('panelScrim').addEventListener('click', closePanel);

// init
updateMode();
rebuildChrome();
rebuildChat();
</script>
</body>
</html>
