<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snake Sprint — Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1025; color: #fff; font-family: 'SF Mono', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; user-select: none; }
  h2 { color: #c4a66a; margin-bottom: 8px; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
  #hud { display: flex; gap: 24px; margin-bottom: 12px; font-size: 13px; color: rgba(255,255,255,0.6); }
  #hud span { color: #c4a66a; }
  canvas { border-radius: 12px; touch-action: none; }
  #msg { margin-top: 12px; font-size: 13px; color: rgba(255,255,255,0.5); height: 20px; }
  #restart { margin-top: 10px; padding: 8px 24px; background: #c4a66a; color: #1a1025; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: inherit; display: none; }
</style>
</head><body>
<h2>Snake Sprint</h2>
<div id="hud">Score: <span id="score">0</span> &nbsp; Length: <span id="length">3</span> &nbsp; Speed: <span id="speed">1</span></div>
<canvas id="c" width="375" height="375"></canvas>
<div id="msg">Swipe or arrow keys to move. Eat pellets, avoid walls & tail!</div>
<button id="restart" onclick="startGame()">Play Again</button>

<script>
const GRID = 15;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = canvas.width / GRID;

let snake, dir, nextDir, pellet, score, alive, tickMs, tickTimer, elapsed, timeLimit;
let particles = [];
let lastTime = 0;
let started = false;

const SPEED_TIERS = [
  { score: 0, ms: 160 },
  { score: 5, ms: 140 },
  { score: 10, ms: 120 },
  { score: 18, ms: 100 },
  { score: 28, ms: 80 },
];

function startGame() {
  const mid = Math.floor(GRID / 2);
  snake = [{ x: mid, y: mid }, { x: mid - 1, y: mid }, { x: mid - 2, y: mid }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  alive = true;
  tickMs = 160;
  tickTimer = 0;
  elapsed = 0;
  timeLimit = 45000;
  particles = [];
  started = true;
  spawnPellet();
  updateHUD();
  document.getElementById('restart').style.display = 'none';
  document.getElementById('msg').textContent = 'Swipe or arrow keys to move';
}

function spawnPellet() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let attempts = 0;
  do {
    pellet = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
    attempts++;
  } while (occupied.has(`${pellet.x},${pellet.y}`) && attempts < 100);
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('length').textContent = snake.length;
  const tier = SPEED_TIERS.filter(t => score >= t.score).length;
  document.getElementById('speed').textContent = tier;
}

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    die(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    die(); return;
  }

  snake.unshift(head);

  // Eat pellet?
  if (head.x === pellet.x && head.y === pellet.y) {
    score++;
    // Particles
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 80;
      particles.push({
        x: (pellet.x + 0.5) * CELL,
        y: (pellet.y + 0.5) * CELL,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 400 + Math.random() * 200,
        maxLife: 600,
        size: 3 + Math.random() * 2,
        color: '#c4a66a',
      });
    }
    spawnPellet();
    // Speed up
    const tier = SPEED_TIERS.filter(t => score >= t.score).pop();
    if (tier) tickMs = tier.ms;
    updateHUD();
  } else {
    snake.pop();
  }
}

function die() {
  alive = false;
  // Death particles
  for (const seg of snake) {
    for (let i = 0; i < 3; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 20 + Math.random() * 60;
      particles.push({
        x: (seg.x + 0.5) * CELL,
        y: (seg.y + 0.5) * CELL,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 500 + Math.random() * 300,
        maxLife: 800,
        size: 2 + Math.random() * 3,
        color: '#e74c3c',
      });
    }
  }
  document.getElementById('msg').textContent = `Dead! Score: ${score} — Length: ${snake.length}`;
  document.getElementById('restart').style.display = 'block';
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#2a1f35';
  ctx.beginPath();
  ctx.roundRect(0, 0, canvas.width, canvas.height, 12);
  ctx.fill();

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
  }

  if (!started) return;

  // Pellet
  if (pellet) {
    const px = (pellet.x + 0.5) * CELL;
    const py = (pellet.y + 0.5) * CELL;
    const pulse = 0.8 + Math.sin(elapsed * 0.006) * 0.2;
    // Glow
    ctx.shadowColor = '#c4a66a';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#c4a66a';
    ctx.beginPath();
    ctx.arc(px, py, CELL * 0.3 * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Snake
  if (alive) {
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const t = i / snake.length;
      const r = CELL * 0.42 * (1 - t * 0.3);

      // Color gradient head to tail
      const g = Math.floor(100 + (1 - t) * 155);
      const b = Math.floor(180 + (1 - t) * 75);
      ctx.fillStyle = `rgb(91, ${g}, ${b})`;

      ctx.beginPath();
      ctx.roundRect(s.x * CELL + (CELL - r * 2) / 2, s.y * CELL + (CELL - r * 2) / 2, r * 2, r * 2, r * 0.4);
      ctx.fill();

      // Head eyes
      if (i === 0) {
        ctx.fillStyle = '#fff';
        const ex = s.x * CELL + CELL / 2 + dir.x * 4;
        const ey = s.y * CELL + CELL / 2 + dir.y * 4;
        ctx.beginPath();
        ctx.arc(ex - dir.y * 3, ey + dir.x * 3, 2.5, 0, Math.PI * 2);
        ctx.arc(ex + dir.y * 3, ey - dir.x * 3, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Timer bar
  if (alive) {
    const frac = Math.max(0, 1 - elapsed / timeLimit);
    ctx.fillStyle = frac > 0.3 ? '#c4a66a' : '#e74c3c';
    ctx.fillRect(4, canvas.height - 6, (canvas.width - 8) * frac, 3);
  }
}

function gameLoop(now) {
  const dt = lastTime ? Math.min(now - lastTime, 50) : 16;
  lastTime = now;

  if (started && alive) {
    elapsed += dt;
    tickTimer += dt;

    if (elapsed >= timeLimit) {
      document.getElementById('msg').textContent = `Time's up! Score: ${score}`;
      document.getElementById('restart').style.display = 'block';
      alive = false;
    }

    while (tickTimer >= tickMs && alive) {
      tickTimer -= tickMs;
      tick();
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * (dt / 1000);
    p.y += p.vy * (dt / 1000);
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (!started) { startGame(); return; }
  switch (e.key) {
    case 'ArrowUp': case 'w': if (dir.y !== 1) nextDir = { x: 0, y: -1 }; break;
    case 'ArrowDown': case 's': if (dir.y !== -1) nextDir = { x: 0, y: 1 }; break;
    case 'ArrowLeft': case 'a': if (dir.x !== 1) nextDir = { x: -1, y: 0 }; break;
    case 'ArrowRight': case 'd': if (dir.x !== -1) nextDir = { x: 1, y: 0 }; break;
  }
  e.preventDefault();
});

// Swipe
let touchStart = null;
canvas.addEventListener('pointerdown', (e) => {
  if (!started) { startGame(); return; }
  touchStart = { x: e.clientX, y: e.clientY };
  e.preventDefault();
});
canvas.addEventListener('pointermove', (e) => {
  if (!touchStart) return;
  const dx = e.clientX - touchStart.x;
  const dy = e.clientY - touchStart.y;
  const threshold = 15;
  if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };
    else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };
  } else {
    if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };
    else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };
  }
  touchStart = { x: e.clientX, y: e.clientY };
  e.preventDefault();
});
canvas.addEventListener('pointerup', () => { touchStart = null; });

requestAnimationFrame(gameLoop);
</script>
</body></html>
