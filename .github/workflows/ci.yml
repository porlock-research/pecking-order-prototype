name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        # npm install (not npm ci) — npm 11 has a known bug with optional
        # platform-specific deps where a lockfile generated on macOS is missing
        # linux-x64-gnu binaries that CI needs (npm/cli#4828). npm install
        # resolves optional deps per-platform at runtime.
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Build
        run: npx turbo run build --filter=...[HEAD^1]

      - name: Lint
        run: npx turbo run lint --filter=...[HEAD^1]

      - name: Test
        run: npx turbo run test --filter=...[HEAD^1]