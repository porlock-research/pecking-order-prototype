name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        # Delete lockfile before install — npm 11 has a bug (npm/cli#4828)
        # where a lockfile generated on one OS is missing optional platform
        # deps for other OSes. npm's own error message recommends rm+regen
        # as the fix. Cost: no lockfile reproducibility in CI. Benefit: CI
        # works across dev platforms.
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Build
        run: npx turbo run build --filter=...[HEAD^1]

      - name: Lint
        run: npx turbo run lint --filter=...[HEAD^1]

      - name: Test
        run: npx turbo run test --filter=...[HEAD^1]